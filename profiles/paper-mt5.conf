# paper-mt5 — Paper (sahte para), MT5 köprüsü üzerinden FOREX/ALTIN izole edge ölçümü sandbox'ı.
#
# ÖNKOŞUL: çalışan MT5 terminali + MemosBridge.mq5 EA grafiğe ekli (köprü ayakta). Yoksa veri
# akmaz → hiçbir işlem açılmaz (stale-feed kapısı korur; sahte fill yok). Edge kripto-özgü
# olduğundan forex'te YENİDEN doğrulanmalı — bu profil o izole ölçümün canlı-paper sandbox'ı.
# [[project_venue_multimarket]] [[project_world_markets]]
TRADING_MODE=Paper
LIVE_DRY_RUN=true
STARTING_CAPITAL=1000
STATE_DB_PATH=data/profiles/paper-mt5.db
HEARTBEAT_PATH=logs/paper-mt5/heartbeat.jsonl
SNAPSHOT_PATH=data/profiles/paper-mt5-snapshot.json

# ── Venue: yalnız MT5 → default venue. Etiketsiz semboller de MT5'e route olur; pinned
#    semboller yine de @mt5 ETİKETLİ verilir (eligibility tag-farkında: çıplak "EURUSD" şekil
#    heuristic'iyle BIST'e sınıflanıp feed'siz görünürdü). Köprü adresi EA ile aynı olmalı. ──
VENUES=mt5:cfd
MT5_BRIDGE_ADDR=127.0.0.1:9001

# ── İzole DB namespace: exchange=mt5 + market=cfd. Cfd → short serbest (forex long+short) ve
#    kripto "futures"/"spot" evrenine KARIŞMAZ (read_candles_market market-saf okur). Engine
#    download'u (venue-farkında) download_mt5 ile AYNI satırlara yazar → çift satır olmaz. ──
TRADE_EXCHANGE=mt5
TRADE_MARKET=cfd
TRADE_INTERVAL=1h
TRADE_SYMBOL=EURUSD@mt5
# Evren = etiketli forex majörleri + altın/gümüş (screener'dan bağımsız orchestrator'a kaydedilir).
PINNED_SYMBOLS=EURUSD@mt5,GBPUSD@mt5,USDJPY@mt5,AUDUSD@mt5,USDCAD@mt5,USDCHF@mt5,XAUUSD@mt5,XAGUSD@mt5

# ── Genel otonom motor (rejime-göre strateji); adanmış kitaplar kapalı (XS/carry/blend
#    kripto-majör + futures-özgü edge'ler — forex'te anlamsız). ──
XS_LIVE_ENABLED=0
CARRY_LIVE_ENABLED=0
BLEND_LIVE_ENABLED=0

# ── Screener KAPALI: çıplak sembol döndürür → eligibility eler. Evren = pinned (yukarıda). ──
SCREENER_TOP_N=0
# Kripto quote-vol likidite kapısı forex'te anlamsız (MT5 tick_volume farklı birim) → kapalı.
SCREENER_MIN_VOLUME=0
# Kripto seed/edge + param sweep raporları forex sembollerine uymaz (sembol-eşleşmezse zaten
# inert; açıkça boş bırakıp kafa karışıklığını önle).
SEED_STRATEGY_PRIORITY=0
EDGE_SEED_REPORT=
PARAM_SWEEP_REPORT=

# ── Yön: forex doğal long+short; _base REGIME_DIRECTIONAL=1 ile rejim-yönlü. Cap'ler dengeli. ──
MAX_CONCURRENT_LONGS=4
MAX_CONCURRENT_SHORTS=4
USE_LIMIT_ENTRY=0
