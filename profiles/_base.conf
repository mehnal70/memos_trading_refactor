# profiles/_base.conf — TÜM profillerin ORTAK tabanı (./memos use <profil> bunu + profil dosyasını birleştirir).
# Sırlar BURADA DEĞİL → .env'de (BINANCE_API_KEY/SECRET, TELEGRAM_BOT_TOKEN). Bu dosyayı elle düzenleyebilirsin
# (tüm profilleri etkiler); profile-özel ayarlar profiles/<ad>.conf'ta. [[project_profiles]]

BUILD_MODE=release
TARGET=tui

# ── Piyasa + paylaşılan veri ──────────────────────────────────────────────────
TRADE_MARKET=futures
TRADE_INTERVAL=15m
# 📊 PAYLAŞILAN mum/funding DB'si — tüm profiller aynı (bir kez indir, hepsi paylaşır).
DB_PATH=data/trader.db
AUTO_INTERVAL_CANDIDATES=1h,4h,1d

# ── Rejim katmanı (bu projede doğrulandı: RegimeDirectional Σpnl% -441→+980, PF 1.51) ──
REGIME_DIRECTIONAL=1
REGIME_ADAPTIVE_PCTL=0.90
STALE_FEED_MAX_AGE_SECS=

# ── Screener + seed/edge keşfi (öğrenilmiş config; paylaşılır) ─────────────────
SCREENER_MIN_SCORE=0.35
SCREENER_TOP_N=8
# Likidite tabanı: 15m quote-vol (~34M USDT/gün) → illikit junk elenir (ALGO ~13M/gün).
SCREENER_MIN_VOLUME=350000
SEED_STRATEGY_PRIORITY=1
EDGE_SEED_REPORT=reports/edge_sweep_20260604_165949.json
EDGE_SEED_MIN_TRADES=15
EDGE_SEED_MAX_PF=10
EDGE_SEED_REQUIRE_WF=1
EDGE_SEED_MAX_TRACKS=3
PARAM_SWEEP_REPORT=reports/param_sweep_20260609_231452.json
PARAM_SWEEP_REQUIRE_WF=1

# ── ScalpSwing fırsatçı alt-kanal: kapalı (genel motor + adanmış kitaplar yeterli) ──
SCALP_SWING_ENABLE=0

# ── Telegram (token + chat_id .env'de; yalnız cooldown burada) ────────────────
TELEGRAM_COOLDOWN_SECS=60
